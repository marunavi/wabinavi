<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わびなび｜おすすめ巡礼ルート記事</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .idx-head{padding:36px 16px 8px;text-align:center}
  .idx-head .eyebrow{font-size:11px;letter-spacing:.22em;color:var(--gold);font-family:var(--sans);font-weight:700;margin-bottom:8px}
  .idx-head h1{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:.04em;line-height:1.5;color:var(--ink)}
  .idx-head p{font-size:13px;color:var(--ink-mute);margin-top:8px}
  .idx-list{padding:24px 16px 90px;display:flex;flex-direction:column;gap:22px}
  .idx-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .3s ease,box-shadow .3s ease}
  .idx-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .idx-card-photo{width:100%;height:200px;overflow:hidden;background:#e8e2d6;position:relative}
  .idx-card-photo img{width:100%;height:100%;object-fit:cover}
  .idx-card-tag{position:absolute;top:14px;left:14px;background:var(--gold-soft);color:#fff;font-size:11px;font-weight:700;padding:5px 13px;border-radius:999px}
  .idx-card-body{padding:18px 20px 22px}
  .idx-card-title{font-family:var(--serif);font-size:18px;font-weight:700;line-height:1.5;color:var(--ink)}
  .idx-card-lead{font-size:13px;color:var(--ink-soft);line-height:1.8;margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .idx-empty{text-align:center;padding:60px 20px;color:var(--ink-mute)}
</style>
</head>
<body>
<div class="page">
  <header class="site-header">
    <span class="hd-spacer"></span>
    <span class="hd-title">巡礼ルート記事</span>
    <span class="hd-spacer"></span>
  </header>

  <div class="idx-head">
    <div class="eyebrow">WABINAVI ARTICLES</div>
    <h1>わびなび<br>おすすめ巡礼ルート</h1>
    <p>由緒ある神社仏閣を巡る、特別な旅の記録</p>
  </div>

  <div class="idx-list" id="list"></div>
</div>

<script>
(function () {
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  fetch('data/articles.json',{cache:'no-store'})
    .then(function(r){return r.ok?r.json():[];})
    .catch(function(){
      try{return JSON.parse(localStorage.getItem('wabinavi_articles')||'[]').filter(function(a){return a.status==='published';});}catch(e){return [];}
    })
    .then(function(articles){
      var el=document.getElementById('list');
      if(!articles||!articles.length){
        el.innerHTML='<div class="idx-empty">記事はまだありません</div>';return;
      }
      el.innerHTML=articles.map(function(a){
        var title=(a.title||'無題').replace(/\n/g,' ');
        return '<a class="idx-card" href="articles/article.html?slug='+esc(a.slug)+'">'+
          '<div class="idx-card-photo">'+(a.hero?'<img src="'+esc(a.hero)+'" alt="">':'')+
            (a.category?'<span class="idx-card-tag">'+esc(a.category)+'</span>':'')+
          '</div>'+
          '<div class="idx-card-body">'+
            '<div class="idx-card-title">'+esc(title)+'</div>'+
            (a.lead?'<div class="idx-card-lead">'+esc(a.lead)+'</div>':'')+
          '</div>'+
        '</a>';
      }).join('');
    });
})();
</script>
</body>
</html>
